<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álcool ou Gasolina</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>É melhor usar àlcool ou Gasolina?</h1>
        <label for="preco-alcool">Preço do Álcool</label>
        <input type="text" name="preco-alcool" id="preco-alcool" placeholder="ex:2.20" class="campo-preco">
        <label for="preco-gasolina">Preço da Gasolina</label>
        <input type="text" name="preco-gasolina" id="preco-gasolina" placeholder="ex:3.50" class="campo-preco">
        <span id="resultado">resultado</span>
        <button id="botao-calcular">Calcular</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
