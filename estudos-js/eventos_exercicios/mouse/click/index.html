<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Selecionar Produto</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!--
    💡 Ideia do exercício (realista)
    “Selecionar produto no cardápio”

    Você vai simular um mini cardápio onde:

    o usuário clica em um produto
    o card fica selecionado (destacado)
    aparece na tela:
    👉 “Você selecionou: Cappuccino”
    -->

    <h1>Escolha seu café</h1>

    <div class="container">
        <div class="card" data-nome="Expresso">Expresso</div>
        <div class="card" data-nome="Americano">Americano</div>
        <div class="card" data-nome="Cappuccino">Cappuccino</div>
        <div class="card" data-nome="Latte">Latte</div>
    </div>

    <h2 id="resultado">Nenhum café selecionado</h2>

    <script src="script.js"></script>
</body>
</html>
