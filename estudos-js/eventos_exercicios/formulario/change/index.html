<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Preço do Café</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!--
    
    💡 Ideia do exercício (realista)
    “Mostrar preço automaticamente ao escolher produto”
    
    O usuário:
    
    escolhe uma bebida no <select>
    
    👉 o sistema:
    
    mostra o preço automaticamente
    
    -->

    <h1>Escolha seu café</h1>

    <select id="bebida">
        <option value="">Selecione</option>
        <option value="expresso">Expresso</option>
        <option value="americano">Americano</option>
        <option value="cappuccino">Cappuccino</option>
        <option value="latte">Latte</option>
    </select>

    <h2 id="preco">Preço: R$ --</h2>

    <script src="script.js"></script>
</body>
</html>
