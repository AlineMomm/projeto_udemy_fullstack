<!DOCTYPE html>

<head>

<body>


    <!--
    
    💡 Ideia do exercício (realista)
    “Validação de nome em tempo real”

    se tiver menos de 3 letras → mostra erro ❌
    se estiver válido → mostra OK ✅

    formulários de cadastro
    login
    checkout
    apps reais
    
    -->

    <h1>Digite seu nome</h1>

    <input type="text" id="nome" placeholder="Seu nome">

    <p id="mensagem"></p>

    <script src="script.js"></script>
</body>
