<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Busca de Cafés</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!--
    
    💡 Ideia do exercício (realista)
    “Busca de cafés em tempo real”

    O usuário começa a digitar:

    👉 e a lista de cafés vai filtrando automaticamente

    Isso é usado em:

    busca de produtos
    autocomplete
    filtros de e-commerce
    sistemas internos

    -->

    <h1>Buscar café</h1>

    <input type="text" id="busca" placeholder="Digite o nome do café...">

    <div class="lista">
        <div class="item">Expresso</div>
        <div class="item">Americano</div>
        <div class="item">Cappuccino</div>
        <div class="item">Latte</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
