<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Pedido - NALA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!--
        💡 Ideia do exercício (realista)
        “Aviso antes de sair da página”
        
        Quando o usuário:
        
        tenta fechar a aba
        atualizar a página
        sair do site
        
        👉 aparece um aviso tipo:
        
        “Tem certeza que deseja sair? Seu pedido será perdido.”
        
        Isso é MUITO usado em:
        
        formulários
        sistemas administrativos
        checkout de compras
    -->

    <div class="container">
        <h1>Faça seu pedido</h1>

        <input type="text" id="nome" placeholder="Digite seu nome">
        <textarea id="mensagem" placeholder="Observações do pedido..."></textarea>

        <p>⚠️ Se você sair da página, o pedido será perdido.</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
