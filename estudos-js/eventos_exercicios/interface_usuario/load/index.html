<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carregamento Cafeteria NALA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!--
    💡 Ideia do exercício (realista)
    “Tela de carregamento da cafeteria”
    
    Quando o site abre:
    
    aparece uma tela com:
    👉 “Carregando Cafeteria NALA... ☕”
    depois de 2 segundos:
    👉 o conteúdo principal aparece
    -->


    <!-- Tela de loading -->
    <div id="loading">
        <h1>Carregando Cafeteria NALA</h1>
        <p>Aguarde um momento...</p>
    </div>

    <!-- Conteúdo da cafeteria (inicialmente oculto) -->
     <div id="conteudo">
        <h1>Bem-Vindo à Cafeteria NALA</h1>
        <p>O melhor café da cidade</p>
     </div>

     <script src="script.js"></script>
</body>
</html>
