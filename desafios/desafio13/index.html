<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio pisicionamento</title>
    <style>
        #banner {
            background-color: purple;
            width: 900px;
            height: 300px;
        }
        #quero-a-promocao {
            background-color: white;
            border: 3px dotted purple;
            color: purple;
            width: 500px;
            text-align: center;
            padding: 20px 100px 20px 100px;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
            position: relative;
            bottom: 30px;
            left: 100px;
            font-size: 30px;
        }
        #tempo-limitado {
            background-color: orange;
            color: white;
            border-radius: 30px;
            padding: 15px;
            width: 160px;
            font-size: 25px;
            position: relative;
            bottom: 190px;
            left: 30px;
        }
    </style>
</head>
<body>
    <h1>Exercicio</h1>
    <div id="banner">
        <img src="../../estudos-css/img/img/banner.png" alt="banner promoção">
        <div id="quero-a-promocao">
            <span>Quero a promoção</span>
        </div>
        <div id="tempo-limitado">
            <span>Tempo limitado</span>
        </div>
    </div>
</body>
</html>
