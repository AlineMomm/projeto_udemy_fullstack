<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navegação Vertical</title>
    <style>
        #menu ul {
            list-style-type: none;
            padding: 0;
            width: 200px;
        }
        #menu li a {
            display: block;
            padding: 0.5em 1.5em;
            color: black;
            text-decoration: none;
            background: #f7b600;
        }
        #menu li a:hover {
            padding: 0.5em 2.5em;
            color: white;
            text-decoration: none;
            background: #f99200;
        }
        #menu li a:active {
            background-color: #885000;
        }
    </style>
</head>
<body>
    <h1>Menu Navegação</h1>

    <div id="menu">
        <ul>
            <li><a href="">Home</a></li>
            <li><a href="">Produtos</a></li>
            <li><a href="">Carrinho</a></li>
            <li><a href="">Contato</a></li>
        </ul>
    </div>
</body>
</html>
