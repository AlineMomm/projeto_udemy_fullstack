<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <style>
        body {
            background-color: black;
        }
        .container-flex {
            width: 300px;
            height: 200px;
            border: 4px solid red;
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
        }
        .container-flex > div {
            color: white;
            border: 4px solid white;
            padding: 4px;
            margin: 4px;
        }
        .item {
            align-self: flex-start;
        }
    </style>
</head>
<body>
    <h1>Alinhamentos</h1>
    <div class="container-flex">
        <div>01</div>
        <div class="item">02</div>
        <div>03</div>
    </div>
</body>
</html>
