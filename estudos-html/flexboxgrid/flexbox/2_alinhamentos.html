<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <style>
        body {
            background-color: black;
        }
        .container-flex {
            width: 300px;
            height: 300px;
            border: 4px solid red;
            display: flex;
            flex-direction: row;
            /* flex-start, flex-end, center, space-around, space-between, space-evenly */
            justify-content: center ;
            /* flex-start, flex-end, center, baseline */
            align-items: center;
            flex-wrap: wrap;
            align-content: center;
        }
        .container-flex > div {
            color: white;
            border: 4px solid white;
            padding: 4px;
            margin: 4px;
        }
        .texto-grande {
            font-size: 3em;
        }
    </style>
</head>
<body>
    <h1>Alinhamentos</h1>
    <div class="container-flex">
        <div>01</div>
        <div class="texto-grande">02</div>
        <div>03</div>
        <div>04</div>
        <div>05</div>
        <div>06</div>
        <div>07</div>
        <div>08</div>
        <div>09</div>
        <div>10</div>
    </div>
</body>
</html>
