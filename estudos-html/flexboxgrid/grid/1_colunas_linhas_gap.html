<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colunas Linhas e Gap</title>
    <style>
        body {
            font-size: 3rem;
            background-color: black;
            color: white;
            margin: 0;
            padding: 20px;
        }
        .grid {
            display: grid;
            height: 100vh;
            /* grid-template-columns: 200px 200px 200px; */
            /* grid-template-columns: 200px 50% 200px; */
            /* grid-template-columns: repeat(4, 25%); */
            /* grid-template-columns: repeat(4, 25%) 200px; */
            /* grid-template-columns: 33.33% 33.33% 33.33%; */
            grid-template-columns: 1fr 1fr 1fr;
            /* grid-template-columns: 20% 1fr 1fr; */
            /* grid-template-columns: repeat(2, 1fr) 2fr; */
            /* grid-template-columns: 4fr 4fr 8fr; */
            /* grid-template-columns: 200px auto; */
            /* grid-template-rows: 300px 200px 1fr 1fr; */
            /* grid-template-rows: 1fr 2fr 4fr 1fr; */
            grid-template-rows: 30% 100px 4fr 1fr;
            row-gap: 20px;
            column-gap: 20px;

        }
        .grid > div {
            border: 1px solid yellow;
        }
    </style>
</head>
<body>
    <div class="grid">
        <div class="item1">1</div>
        <div class="item2">2</div>
        <div class="item3">3</div>
        <div class="item4">4</div>
        <div class="item5">5</div>
        <div class="item6">6</div>
        <div class="item7">7</div>
        <div class="item8">8</div>
        <div class="item9">9</div>
        <div class="item10">10</div>
        <div class="item11">11</div>
        <div class="item12">12</div>
    </div>
</body>
</html>
